<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summer Basketball Camp 2027</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#c8102e;
    color:white;
    padding:20px;
    text-align:center;
}

.hero{
    text-align:center;
    padding:50px 20px;
}

.hero img{
    max-width:500px;
    width:100%;
}

.btn{
    display:inline-block;
    background:#c8102e;
    color:white;
    padding:15px 25px;
    border-radius:10px;
    text-decoration:none;
    margin-top:20px;
}
</style>

</head>
<body>

<header>
    <h1>LETNJI KOŠARKAŠKI KAMP AJDINOVIĆI 2027</h1>
</header>

<div class="hero">

    <img src="kamp-poster.jpg">

    <h2>KK TEMPO AJDINOVIĆI 2027</h2>
    <h2>Otvorene su prijave za košarkaški kamp KK Tempo u Ajdinovićima</h2>

    <p>Treninzi, takmičenja, druženje i razvoj košarkaških veština.</p>

    <div style="text-align:center; margin-top:30px;">

    <a href="https://wa.me/381640024662?text=Zdravo,%20želim%20da%20prijavim%20dete%20na%20Summer%20Basketball%20Camp%20Tivat%202027."
       target="_blank"
       class="btn">

        PRIJAVI SE NA KAMP

    </a>

<form id="kampForma">

    <input type="text" id="ime" placeholder="Ime i prezime deteta" required>

    <input type="number" id="godiste" placeholder="Godište" required>

    <input type="text" id="roditelj" placeholder="Ime roditelja" required>

    <input type="tel" id="telefon" placeholder="Telefon" required>

    <input type="vel" id="veličina opreme" placeholder="Veličina opreme" required>

    <button type="button" onclick="prijavaKamp()">
        PRIJAVI SE NA KAMP
    </button>

</form>

<script>
function prijavaKamp(){

    let ime = document.getElementById("ime").value;
    let godiste = document.getElementById("godiste").value;
    let roditelj = document.getElementById("roditelj").value;
    let telefon = document.getElementById("telefon").value;
    let veličina opreme = document.getElementById("veličina opreme").value;

    let poruka =
`PRIJAVA ZA LETNJI KOŠARKAŠKI KAMP 2027

Ime i prezime deteta: ${ime}
Godište: ${godiste}
Roditelj: ${roditelj}
Telefon: ${telefon}
Veličina opreme: ${veličina opreme}`;

    let url =
    "https://wa.me/381640024662?text=" +
    encodeURIComponent(poruka);

    window.open(url, "_blank");
}
</script>

</div>

    <a href="index.html" class="btn">
        Nazad na sajt
    </a>

</div>

</body>
</html>
