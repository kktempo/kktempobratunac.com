<!DOCTYPE html>

<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roditeljski portal - KK Tempo</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.portal{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#c8102e;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#c8102e;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.kartica{
    margin-top:25px;
    padding:20px;
    background:#f8f8f8;
    border-radius:10px;
    display:none;
}
</style>

</head>

<body>

<div class="portal">

<h1>Roditeljski portal</h1>

<input type="text" id="sifra" placeholder="Unesite šifru deteta">

<button onclick="prikaziPodatke()">Prikaži podatke</button>

<div class="kartica" id="podaci">
    <h2>Podaci člana</h2>

```
<p><strong>Ime:</strong> Marko Petrović</p>

<p><strong>Status članarine:</strong> PLAĆENO</p>

<p><strong>Poslednja uplata:</strong> 01.06.2027.</p>

<p><strong>Dolasci na trening:</strong> 18</p>

<p><strong>Izostanci:</strong> 2</p>

<p><strong>Napomena:</strong> Sve obaveze izmirene.</p>
```

</div>

</div>

<script>

const clanovi = {

    "TEMPO001": {
        ime: "Aleksej Krsmanović",
        clanarina: "PLAĆENO",
        godiste: "2014",
        program: "Program 2",
        januar: "PLAĆENO",
        februar: "PLAĆENO",
        mart: "PLAĆENO",
        april: "PLAĆENO",
        maj: "NIJE PLAĆENO",
        jun: "NIJE PLAĆENO"
    },

    "TEMPO002": {
        ime: "Nikola Jovanović",
        clanarina: "DUGUJE JUN",
        godiste: "2014",
        program: "Program 2",
        januar: "PLAĆENO",
        februar: "PLAĆENO",
        mart: "PLAĆENO",
        april: "PLAĆENO",
        maj: "PLAĆENO",
        jun: "NIJE PLAĆENO"
    },

    "TEMPO003": {
        ime: "Petar Ilić",
        clanarina: "PLAĆENO",
        godiste: "2014",
        program: "Program 2",
        januar: "PLAĆENO",
        februar: "PLAĆENO",
        mart: "PLAĆENO",
        april: "PLAĆENO",
        maj: "PLAĆENO",
        jun: "PLAĆENO"
    }

};


function prikaziPodatke(){

    let sifra = document.getElementById("sifra").value.trim();

    if(clanovi[sifra]){

        let clan = clanovi[sifra];

        document.getElementById("podaci").innerHTML = `
    <h2>${clan.ime}</h2>

    <p><strong>Godište:</strong> ${clan.godiste}</p>

    <p><strong>Program:</strong> ${clan.program}</p>

    <hr>

<p class="obavestenje">
✅ Članarina za jun je uspešno evidentirana.
</p>

    <h3>Pregled članarina</h3>

    <p>Januar:
        <span style="color:${clan.januar === 'PLAĆENO' ? 'green' : 'red'}; font-weight:bold;">
            ${clan.januar}
        </span>
    </p>

    <p>Februar:
        <span style="color:${clan.februar === 'PLAĆENO' ? 'green' : 'red'}; font-weight:bold;">
            ${clan.februar}
        </span>
    </p>

    <p>Mart:
        <span style="color:${clan.mart === 'PLAĆENO' ? 'green' : 'red'}; font-weight:bold;">
            ${clan.mart}
        </span>
    </p>

    <p>April:
        <span style="color:${clan.april === 'PLAĆENO' ? 'green' : 'red'}; font-weight:bold;">
            ${clan.april}
        </span>
    </p>

    <p>Maj:
        <span style="color:${clan.maj === 'PLAĆENO' ? 'green' : 'red'}; font-weight:bold;">
            ${clan.maj}
        </span>
    </p>

    <p>Jun:
        <span style="color:${clan.jun === 'PLAĆENO' ? 'green' : 'red'}; font-weight:bold;">
            ${clan.jun}
        </span>
    </p>
`;
        document.getElementById("podaci").style.display = "block";

    }else{

        alert("Šifra nije pronađena. Proverite unos i pokušajte ponovo.");

    }

}

</script>
